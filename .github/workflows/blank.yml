name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
   build:
    runs-on: ubuntu-latest
    steps:     
    - uses: actions/checkout@v2
    - name: docker build
      run: |
        docker build -t eabrega/astronav-web .
        docker push eabrega/astronav-web:latest
